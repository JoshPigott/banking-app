<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>True Funds Bank - Login</title>
  <link rel="stylesheet" href="static/style.css">
  <!--I should look into loading image up here-->
  <script src="https://cdn.jsdelivr.net/npm/htmx.org@2.0.10/dist/htmx.js"
   integrity="sha384-Q+Dky3iHVJOr6wUjQ4ulh6uQ76an/t+ak1+PjMVaxRjbZamFLAG+u9InkfjbsEQf"
    crossorigin="anonymous"></script>
</head>
<body>
  <div>
    <h1>True Funds</h1>
  </div>
  <div>
    <h2>Continue to Online Banking</h2>
    <!--FORM SECTION-->
    <form>
      <!--I wonder if I can put like some icons in the input area for login and password-->
      <label>Username</label>
      <input
        type="text"
        id="username"
        name="username"
        required
        maxlength="14"
      > 
      <label>Password</label>
      <input
        type="password"
        id="password"
        name="password"
        required
        maxlength="100"
      > 
      <p class="auth__message"></p>

      <button type="submit" hx-post="/login" hx-target=".auth__message">Login</button>
      <button type="submit" hx-post="/sign-up" hx-target=".auth__message">Sign Up</button>

    </form>
  </div>
</body>

</html>
