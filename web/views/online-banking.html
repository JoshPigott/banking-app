<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>True Funds Bank - Balance</title>
    <link rel="stylesheet" href="static/style.css">
    <link rel="icon" type="image/png" href="static/favicon.png">
    <!--I should look into loading image up here-->
    <script src="https://cdn.jsdelivr.net/npm/htmx.org@2.0.10/dist/htmx.js"
    integrity="sha384-Q+Dky3iHVJOr6wUjQ4ulh6uQ76an/t+ak1+PjMVaxRjbZamFLAG+u9InkfjbsEQf"
    crossorigin="anonymous"></script>
</head>
<body class="background__full-page">
  <header>
    <div class="header__button-container">
      <a hx-get="/logout" class="header__button header__button--logout">
        <img src="static/password-icon.png" alt="password icon">
        <p>Log out</p>
      </a>
    </div>
    <div class="header__title-container">
      <h1>True Funds</h1>
    </div>
  </header>
  <main class="banking">
    <div class="banking__dashboard">
      <h2 class="banking__meassage" hx-get="/get-welcome-message" hx-trigger="load">Hello</h2>
      <div class="banking__transactions">
        <!--I wonder if I can put like some icons in the input area for login and password-->
        <a href="transfer" class="banking__links banking__transfer">Transfer money</a>
        <a href="payment"class="banking__links">Make a payment</a>
      </div>
    </div>
    <div class="banking__accounts-container">
      <div class="banking__accounts">
        <article class="banking__everyday banking__account" hx-get="/account-balance"
         hx-vals='{"bankAccountType": "everyday"}' hx-trigger="load">
        </article>
        <article class="banking__saver banking__account" hx-get="/account-balance"
         hx-vals='{"bankAccountType": "saver"}' hx-trigger="load">
        </article>
        <article class="banking__kiwi-saver banking__account" hx-get="/account-balance"
         hx-vals='{"bankAccountType": "kiwiSaver"}' hx-trigger="load">
        </article>
      </div>
    </div>
  </main>
</body>
</html>
